version: "2"
sql:
  - engine: postgresql
    queries: query
    schema: ../migrations
    gen:
      go:
        package: db
        out: generated
        sql_package: pgx/v5
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: housing_type
            go_type: string
          - db_type: lifestyle_style
            go_type: string
          - db_type: financial_program
            go_type: string
          - db_type: expense_category_type
            go_type: string
          - db_type: debt_method
            go_type: string
          - db_type: fatigue_status
            go_type: string
